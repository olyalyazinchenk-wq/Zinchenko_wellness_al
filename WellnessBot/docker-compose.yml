version: "3.8"

services:
  wellnessbot:
    build: .
    container_name: wellnessbot
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8080)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
